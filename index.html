<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Stock Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-void:#080a0e; --bg-surface:#0d1117; --bg-card:#111620;
  --bg-elevated:#171e2b; --border:#1e2a3a; --border-bright:#2a3a52;
  --text-primary:#e8edf5; --text-secondary:#7a8fa8; --text-muted:#3d5068;
  --accent:#3b82f6; --accent-dim:#1d3a6e; --accent-glow:rgba(59,130,246,0.12);
  --green:#10b981; --green-dim:#0d3d2a; --red:#ef4444; --red-dim:#3d1212;
  --amber:#f59e0b; --amber-dim:#3d2a06; --purple:#8b5cf6; --purple-dim:#2d1b6e;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
}
html { font-size:14px; background:var(--bg-void); color:var(--text-primary); font-family:var(--sans); }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:2px; }
.shell { display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:220px; min-width:220px; background:var(--bg-surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); }
.logo-mark { font-family:var(--mono); font-size:18px; letter-spacing:4px; color:var(--accent); font-weight:700; display:block; }
.logo-sub { font-size:9px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
.nav { padding:10px; flex:1; overflow-y:auto; }
.nav-section { margin-bottom:16px; }
.nav-label { font-size:9px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; padding:0 10px; margin-bottom:4px; display:block; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; cursor:pointer; color:var(--text-secondary); font-size:13px; transition:all 0.15s; border:1px solid transparent; margin-bottom:1px; }
.nav-item:hover { background:var(--bg-elevated); color:var(--text-primary); }
.nav-item.active { background:var(--accent-glow); border-color:var(--accent-dim); color:var(--accent); }
.nav-item svg { width:14px; height:14px; flex-shrink:0; }
.nav-badge { margin-left:auto; font-size:8px; font-family:var(--mono); background:var(--red-dim); color:var(--red); padding:1px 5px; border-radius:3px; }
.sidebar-footer { padding:12px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted); font-family:var(--mono); }
.market-status { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* API BANNER */
.api-banner { background:var(--amber-dim); border-bottom:1px solid rgba(245,158,11,0.3); padding:7px 18px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.api-banner input { flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--amber); border-radius:4px; padding:5px 10px; color:var(--text-primary); font-family:var(--mono); font-size:11px; outline:none; }
.api-banner button { padding:5px 14px; background:var(--amber); border:none; border-radius:4px; color:#000; font-size:11px; cursor:pointer; font-weight:600; white-space:nowrap; }
.api-banner span { font-size:11px; color:var(--amber); white-space:nowrap; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:54px; background:var(--bg-surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.page-title { font-size:15px; font-weight:500; }
.page-date { font-size:10px; color:var(--text-muted); font-family:var(--mono); }
.topbar-right { display:flex; align-items:center; gap:8px; }
.btn { display:flex; align-items:center; gap:5px; padding:6px 13px; background:transparent; border:1px solid var(--border-bright); border-radius:6px; color:var(--text-secondary); font-size:11px; cursor:pointer; font-family:var(--sans); transition:all 0.15s; }
.btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.primary:hover { background:#2563eb; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.content { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }

/* KPI */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.kpi-card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:15px 17px; position:relative; overflow:hidden; }
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent-dim),transparent); }
.kpi-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:7px; }
.kpi-value { font-family:var(--mono); font-size:20px; font-weight:700; margin-bottom:4px; }
.kpi-change { font-size:10px; font-family:var(--mono); }
.up { color:var(--green); } .down { color:var(--red); } .neutral { color:var(--text-muted); }

/* PANEL */
.panel { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.panel-header { padding:13px 17px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.panel-title { font-size:11px; font-weight:500; color:var(--text-primary); letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:7px; }
.panel-sub { font-size:10px; color:var(--text-muted); font-family:var(--mono); }
.chip { padding:2px 8px; border-radius:4px; font-size:9px; font-family:var(--mono); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; transition:all 0.12s; }
.chip:hover, .chip.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }

/* BADGES */
.badge { padding:1px 7px; border-radius:3px; font-size:8px; font-family:var(--mono); letter-spacing:0.5px; text-transform:uppercase; }
.badge-blue { background:var(--accent-dim); color:var(--accent); }
.badge-green { background:var(--green-dim); color:var(--green); }
.badge-red { background:var(--red-dim); color:var(--red); }
.badge-amber { background:var(--amber-dim); color:var(--amber); }
.badge-purple { background:var(--purple-dim); color:var(--purple); }

/* PORTFOLIO TABLE */
.pt { width:100%; border-collapse:collapse; }
.pt th { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); padding:8px 17px; text-align:left; border-bottom:1px solid var(--border); background:var(--bg-surface); font-weight:500; }
.pt td { border-bottom:1px solid var(--border); }
.pt tr:last-child td { border-bottom:none; }
.pt tr { cursor:pointer; }
.pt-inner { padding:11px 17px; transition:background 0.1s; }
.pt tr:hover .pt-inner { background:var(--bg-elevated); }
.ticker-sym { font-family:var(--mono); font-size:12px; font-weight:700; }
.ticker-name { font-size:10px; color:var(--text-muted); margin-top:1px; }
.price-val { font-family:var(--mono); font-size:12px; }
.chg-pill { display:inline-flex; align-items:center; gap:2px; padding:1px 6px; border-radius:3px; font-family:var(--mono); font-size:10px; font-weight:700; }
.chg-pill.up { background:var(--green-dim); color:var(--green); }
.chg-pill.down { background:var(--red-dim); color:var(--red); }
.spark { width:68px; height:26px; }
.sector-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:8px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-muted); text-transform:uppercase; }

/* ALLOC */
.alloc-row { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
.alloc-lbl { font-family:var(--mono); font-size:10px; color:var(--text-secondary); width:42px; }
.alloc-bg { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.alloc-fill { height:100%; border-radius:2px; }
.alloc-pct { font-family:var(--mono); font-size:10px; color:var(--text-muted); width:28px; text-align:right; }

/* DRAWER */
.drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:50; display:none; justify-content:flex-end; }
.drawer-overlay.open { display:flex; }
.drawer { width:460px; height:100%; background:var(--bg-card); border-left:1px solid var(--border-bright); display:flex; flex-direction:column; overflow:hidden; animation:slideIn 0.22s ease; }
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.drawer-top { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0; }
.drawer-body { flex:1; overflow-y:auto; padding:18px 20px; display:flex; flex-direction:column; gap:16px; }
.close-btn { background:none; border:1px solid var(--border); color:var(--text-muted); width:26px; height:26px; border-radius:5px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.close-btn:hover { color:var(--text-primary); border-color:var(--border-bright); }

/* PREDICTION CARD */
.pred-card { background:var(--bg-elevated); border:1px solid var(--border-bright); border-radius:8px; padding:15px; }
.pred-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.pred-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; }
.sentiment-bar { height:3px; border-radius:2px; background:var(--border); overflow:hidden; margin-bottom:11px; }
.sentiment-fill { height:100%; border-radius:2px; transition:width 0.8s ease; }
.pred-target { font-family:var(--mono); font-size:20px; font-weight:700; margin-bottom:3px; }
.pred-range { font-family:var(--mono); font-size:10px; color:var(--text-secondary); margin-bottom:10px; }
.pred-text { font-size:11px; color:var(--text-secondary); line-height:1.7; }
.spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-muted); font-style:italic; }

/* NEWS ITEMS */
.news-item { padding:12px 17px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.news-item:last-child { border-bottom:none; }
.news-item:hover { background:var(--bg-elevated); }
.news-meta { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.news-source { font-size:9px; font-family:var(--mono); color:var(--accent); text-transform:uppercase; }
.news-time { font-size:9px; color:var(--text-muted); font-family:var(--mono); }
.news-headline { font-size:12px; color:var(--text-primary); line-height:1.5; margin-bottom:4px; }
.news-impact { font-size:10px; color:var(--text-muted); line-height:1.5; }
.news-tickers { display:flex; gap:3px; margin-left:auto; }
.news-ticker-tag { font-family:var(--mono); font-size:8px; padding:1px 4px; border-radius:2px; background:var(--accent-dim); color:var(--accent); }
.sent-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }

/* AI PANEL */
.ai-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.ai-header { padding:11px 17px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.ai-badge { padding:2px 7px; background:var(--accent-dim); border:1px solid var(--accent); border-radius:3px; font-size:8px; font-family:var(--mono); color:var(--accent); letter-spacing:1px; }
.ai-badge-ws { padding:2px 7px; background:var(--green-dim); border:1px solid var(--green); border-radius:3px; font-size:8px; font-family:var(--mono); color:var(--green); letter-spacing:1px; }
.ai-body { padding:13px 17px; }
.ai-prompt-row { display:flex; gap:7px; margin-bottom:9px; }
.ai-input { flex:1; background:var(--bg-elevated); border:1px solid var(--border-bright); border-radius:6px; padding:8px 11px; color:var(--text-primary); font-family:var(--sans); font-size:12px; outline:none; transition:border-color 0.15s; }
.ai-input:focus { border-color:var(--accent); }
.ai-input::placeholder { color:var(--text-muted); }
.ai-submit { padding:8px 13px; background:var(--accent); border:none; border-radius:6px; color:#fff; font-size:11px; cursor:pointer; white-space:nowrap; font-family:var(--sans); }
.ai-submit:hover { background:#2563eb; }
.ai-submit:disabled { background:var(--accent-dim); color:var(--text-muted); cursor:not-allowed; }
.ai-response { background:var(--bg-elevated); border:1px solid var(--border); border-radius:6px; padding:11px 13px; font-size:11px; line-height:1.75; color:var(--text-secondary); min-height:68px; }
.quick-chips { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:9px; }
.ai-typing::after { content:'▋'; animation:blink 0.8s step-start infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg-card); border:1px solid var(--border-bright); border-radius:12px; padding:24px; width:370px; }
.modal h2 { font-size:14px; font-weight:500; margin-bottom:16px; }
.form-group { margin-bottom:11px; }
.form-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:5px; }
.form-input { width:100%; background:var(--bg-elevated); border:1px solid var(--border-bright); border-radius:6px; padding:7px 10px; color:var(--text-primary); font-family:var(--mono); font-size:12px; outline:none; }
.form-input:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:7px; margin-top:16px; justify-content:flex-end; }

/* WL */
.wl-item { padding:10px 17px; display:flex; align-items:center; gap:9px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.wl-item:last-child { border-bottom:none; }
.wl-item:hover { background:var(--bg-elevated); }
.wl-sym { font-family:var(--mono); font-size:12px; font-weight:700; width:48px; }
.wl-name { font-size:10px; color:var(--text-muted); flex:1; }
.wl-price { font-family:var(--mono); font-size:11px; min-width:56px; text-align:right; }

/* PROSPECT */
.prospect-card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:border-color 0.15s; }
.prospect-card:hover { border-color:var(--border-bright); }

/* GRID */
.two-col { display:grid; grid-template-columns:1fr 300px; gap:16px; }
.news-grid { display:grid; grid-template-columns:1fr 340px; gap:16px; }
.table-scroll { overflow-x:auto; }
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <span class="logo-mark">PRISM</span>
    <span class="logo-sub">Stock Intelligence</span>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <span class="nav-label">Views</span>
      <div class="nav-item active" onclick="switchView('portfolio')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Portfolio
      </div>
      <div class="nav-item" onclick="switchView('news')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h6"/></svg>
        News Intel
        <span class="nav-badge">LIVE</span>
      </div>
      <div class="nav-item" onclick="switchView('watchlist')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.6 3.5L8 10l-3.1 1.5.6-3.5L3 5.5l3.5-.5z"/></svg>
        Watchlist
      </div>
      <div class="nav-item" onclick="switchView('prospect')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5L14 14"/></svg>
        Prospect
      </div>
    </div>
    <div class="nav-section">
      <span class="nav-label">Analyze</span>
      <div class="nav-item" onclick="switchView('ai')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2C5 2 3 4 3 7c0 1.5.6 2.8 1.5 3.7L4 14h8l-.5-3.3C12.4 9.8 13 8.5 13 7c0-3-2-5-5-5z"/></svg>
        AI Analysis
      </div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="market-status"><div class="dot"></div><span>Market Open</span></div>
    <div id="clock" style="font-size:10px;">--:--:-- ET</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="api-banner" id="api-banner">
    <span>⚡ API Key Required</span>
    <input type="password" id="api-key-input" placeholder="Paste your Anthropic API key (sk-ant-…)" />
    <button onclick="saveApiKey()">Connect AI</button>
  </div>
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title" id="page-title">Portfolio Overview</span>
      <span class="page-date" id="page-date"></span>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="refreshPrices()">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4l2.5 2.5L6 4M3.5 6.5A6 6 0 1 1 2 10"/></svg>
        Refresh
      </button>
      <button class="btn primary" onclick="openModal()">+ Add Stock</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>
</div>

<!-- STOCK DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawerCheck(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-top">
      <div>
        <div id="drawer-ticker" style="font-family:var(--mono);font-size:20px;font-weight:700;"></div>
        <div id="drawer-name" style="font-size:11px;color:var(--text-muted);margin-top:2px;"></div>
      </div>
      <button class="close-btn" onclick="closeDrawerDirect()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Add Position</h2>
    <div class="form-group"><label class="form-label">Ticker Symbol</label><input class="form-input" id="add-ticker" placeholder="AAPL" style="text-transform:uppercase;"></div>
    <div class="form-group"><label class="form-label">Company Name</label><input class="form-input" id="add-name" placeholder="Apple Inc."></div>
    <div class="form-group"><label class="form-label">Shares</label><input class="form-input" id="add-shares" type="number" placeholder="100"></div>
    <div class="form-group"><label class="form-label">Avg Cost / Share ($)</label><input class="form-input" id="add-cost" type="number" placeholder="150.00"></div>
    <div class="form-group"><label class="form-label">Sector</label><input class="form-input" id="add-sector" placeholder="Technology"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addStock()">Add Position</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let API_KEY = '';
let currentView = 'portfolio';
let predictionCache = {};

let portfolio = [
  { ticker:'AAPL', name:'Apple Inc.', shares:25, cost:142.50, price:213.49, sector:'Technology', color:'#3b82f6' },
  { ticker:'NVDA', name:'NVIDIA Corp.', shares:10, cost:480.00, price:875.39, sector:'Technology', color:'#10b981' },
  { ticker:'MSFT', name:'Microsoft Corp.', shares:15, cost:290.00, price:420.11, sector:'Technology', color:'#8b5cf6' },
  { ticker:'JPM',  name:'JPMorgan Chase', shares:20, cost:175.00, price:234.56, sector:'Financials', color:'#f59e0b' },
  { ticker:'UNH',  name:'UnitedHealth Group', shares:8, cost:520.00, price:491.23, sector:'Healthcare', color:'#ef4444' },
];

let watchlist = [
  { ticker:'TSLA', name:'Tesla Inc.', price:182.45, change:2.31, pct:1.28 },
  { ticker:'GOOGL', name:'Alphabet Inc.', price:178.92, change:-1.44, pct:-0.80 },
  { ticker:'AMZN', name:'Amazon.com Inc.', price:204.67, change:3.12, pct:1.55 },
  { ticker:'META', name:'Meta Platforms', price:536.28, change:8.90, pct:1.69 },

const fmt = (n, d=2) => (+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fuzz = p => +(p*(1+(Math.random()-0.5)*0.006)).toFixed(2);
const totalValue = () => portfolio.reduce((s,p)=>s+p.price*p.shares,0);
const totalCost  = () => portfolio.reduce((s,p)=>s+p.cost*p.shares,0);
const totalPnL   = () => totalValue()-totalCost();
const totalPct   = () => totalPnL()/totalCost()*100;

function sparkPath(w, h, up) {
  const pts=[]; let v=h*.5;
  for(let i=0;i<=10;i++){v+=((Math.random()-.45)*(h*.14))*(up?.9:1.1);v=Math.max(3,Math.min(h-3,v));pts.push([i*(w/10),v]);}
  return 'M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
}
function svgSpark(up, color) {
  return `<svg class="spark" viewBox="0 0 68 26"><path d="${sparkPath(68,26,up)}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

async function claudeCall(system, userMsg, useWebSearch=false){
  const body={ model:'claude-sonnet-4-20250514', max_tokens:1000, system, messages:[{role:'user',content:userMsg}] };
  if(useWebSearch) body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function loadPrediction(ticker, name, price){
  const el=()=>document.getElementById('pred-card');
  const ck=ticker+'_pred_'+new Date().toDateString();
  if(predictionCache[ck]){ if(el()) renderPredCard(el(), predictionCache[ck], price); return; }
  try {
    const sys=`You are a quantitative equity analyst. Respond ONLY with valid JSON, no markdown fences. Schema: {"target":number,"low":number,"high":number,"sentiment":"bullish"|"bearish"|"neutral","confidence":0-100,"timeframe":"90 days","catalysts":["string","string","string"],"risks":["string","string"],"summary":"2-3 sentence price outlook"}`;
    const raw=await claudeCall(sys,`Search for recent news and analyst coverage for ${ticker} (${name}) at $${price}. Then give a data-driven 90-day price target in JSON.`,true);
    let d;
    try { d=JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e){ d={target:+(price*1.07).toFixed(2),low:+(price*.88).toFixed(2),high:+(price*1.22).toFixed(2),sentiment:'neutral',confidence:52,catalysts:['Sector momentum','Earnings trajectory','Market conditions'],risks:['Macro uncertainty','Valuation stretch'],summary:'AI model could not parse structured output. Search for recent analyst notes on '+ticker+' for updated targets.'}; }
    predictionCache[ck]=d;
    if(el()) renderPredCard(el(), d, price);
  } catch(e){ if(el()) el().innerHTML=`<div style="font-size:11px;color:var(--red)">Error: ${e.message}</div>`; }
}

function renderPredCard(el, d, cur){
  const up=d.target>=cur;
  const upPct=((d.target-cur)/cur*100).toFixed(1);
  const sc=d.sentiment==='bullish'?'var(--green)':d.sentiment==='bearish'?'var(--red)':'var(--amber)';
  const sb=d.sentiment==='bullish'?'badge-green':d.sentiment==='bearish'?'badge-red':'badge-amber';
  el.innerHTML=`
    <div class="pred-header"><span class="pred-label">AI Price Prediction · 90-day</span><span class="badge ${sb}">${(d.sentiment||'neutral').toUpperCase()}</span></div>
    <div class="pred-target ${up?'up':'down'}">$${fmt(d.target)} <span style="font-size:13px;">${up?'▲':'▼'}${Math.abs(upPct)}%</span></div>
    <div class="pred-range">Bear $${fmt(d.low)} · Bull $${fmt(d.high)} · Confidence ${d.confidence}%</div>
    <div class="sentiment-bar"><div class="sentiment-fill" style="width:${d.confidence}%;background:${sc};"></div></div>
    <div class="pred-text" style="margin-bottom:12px;">${d.summary||''}</div>
    ${d.catalysts?.length?`<div style="margin-bottom:10px;"><div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">Catalysts</div>${d.catalysts.map(c=>`<div style="font-size:10px;color:var(--green);margin-bottom:2px;">+ ${c}</div>`).join('')}</div>`:''}
    ${d.risks?.length?`<div><div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">Risks</div>${d.risks.map(r=>`<div style="font-size:10px;color:var(--red);margin-bottom:2px;">− ${r}</div>`).join('')}</div>`:''}

function renderProspect(){
  document.getElementById('page-title').textContent='Prospect Stocks';
  const cards=prospects.map(p=>`
    <div class="prospect-card" onclick="openDrawer('${p.ticker}','${p.name}',${p.price},true,'Equity')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;">
        <div><div style="font-family:var(--mono);font-size:16px;font-weight:700;">${p.ticker}</div><div style="font-size:10px;color:var(--text-muted);margin-top:1px;">${p.name}</div></div>
        <div style="text-align:right;"><div style="font-family:var(--mono);font-size:14px;">$${fmt(p.price)}</div><div style="font-size:10px;color:var(--green);font-family:var(--mono);">${p.upside}</div></div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:9px;">
        <span class="badge ${p.rating.includes('Strong')?'badge-green':p.rating==='Buy'?'badge-blue':'badge-amber'}">${p.rating}</span>
        ${svgSpark(true,'var(--accent)')}
      </div>
      <div style="font-size:11px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px;">${p.note}</div>
      <div style="font-size:9px;color:var(--accent);">Click for AI prediction + live news →</div>
    </div>
  `).join('');
  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:13px;">${cards}</div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title"><span class="badge badge-blue" style="margin-right:6px;">AI</span>Discover New Stocks</span><span class="panel-sub">powered by Claude + web search</span></div>
      <div style="padding:14px 17px;">
        <div class="ai-prompt-row" style="margin-bottom:0;">
          <input class="ai-input" id="prospect-input" placeholder="e.g. 'undervalued AI infrastructure plays' or 'dividend stocks yielding 4%+' or 'beaten-down biotech near catalysts'…">
          <button class="ai-submit" id="prospect-btn" onclick="discoverStocks()">Discover ↗</button>
        </div>
      </div>
      <div id="prospect-result"></div>
    </div>
  `;
  document.getElementById('prospect-input').addEventListener('keydown',e=>{if(e.key==='Enter')discoverStocks();});
}

async function discoverStocks(){
  if(!API_KEY){alert('Enter your API key first.');return;}
  const inp=document.getElementById('prospect-input');
  const btn=document.getElementById('prospect-btn');
  const res=document.getElementById('prospect-result');
  const q=inp.value.trim(); if(!q) return;
  btn.disabled=true; btn.textContent='…';
  res.innerHTML=`<div style="padding:14px 17px;" class="loading-row"><div class="spinner"></div>Searching for stocks matching "${q}"…</div>`;
  try {
    const sys=`You are a stock analyst with web search access. Find 4 specific stock picks matching the user's investment criteria. Use current prices. Return ONLY a JSON array: [{"ticker":"...","name":"...","price":number,"upside":"±XX%","rating":"Strong Buy|Buy|Neutral|Sell","note":"1-2 sentence investment thesis with specific data","sector":"..."}]. No markdown, no extra text.`;
    const raw=await claudeCall(sys,`Find stocks matching this criteria: ${q}. Search for current prices and recent analyst reports.`,true);
    let items=[];
    try { items=JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e){}
    if(items.length){
      items.forEach(s=>{if(!prospects.find(p=>p.ticker===s.ticker))prospects.push(s);});
      renderProspect();
    } else {
      res.innerHTML=`<div style="padding:14px 17px;font-size:11px;color:var(--text-secondary);line-height:1.75;">${raw}</div>`;
    }
  } catch(e){res.innerHTML=`<div style="padding:14px 17px;font-size:11px;color:var(--red)">Error: ${e.message}</div>`;}
  btn.disabled=false; btn.textContent='Discover ↗';
}

// ── AI VIEW ────────────────────────────────────────────────────────────────
function renderAIView(){
  document.getElementById('page-title').textContent='AI Analysis';
  const qs=['Analyze my portfolio risk','Which positions to trim?','Best opportunities this week','Market outlook right now?','Summarize my top holdings','Where to invest $10,000?','What stocks are moving today?'];
  document.getElementById('content').innerHTML=`<div style="max-width:740px;">
    <div class="ai-panel">
      <div class="ai-header"><span class="panel-title">AI Analysis</span><span class="ai-badge">CLAUDE</span><span class="ai-badge-ws">LIVE WEB SEARCH</span></div>
      <div class="ai-body">
        <div class="ai-prompt-row"><input class="ai-input" id="ai-input" placeholder="Ask about your portfolio, specific stocks, or current market conditions…" style="font-size:13px;padding:9px 12px;"><button class="ai-submit" id="ai-btn" onclick="runAI()">Analyze ↗</button></div>
        <div class="quick-chips">${qs.map(q=>`<span class="chip" onclick="document.getElementById('ai-input').value='${q}';runAI()">${q}</span>`).join('')}</div>
        <div class="ai-response" id="ai-response" style="color:var(--text-muted);font-style:italic;min-height:110px;">Powered by Claude with live web search. Your full portfolio context is automatically included in every query.</div>
      </div>
    </div>
  </div>`;
  document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')runAI();});
}

// ── MINI AI PANEL ──────────────────────────────────────────────────────────
function miniAIPanel(){
  return `<div class="ai-panel"><div class="ai-header"><span class="panel-title">AI Analysis</span><span class="ai-badge">CLAUDE</span><span class="ai-badge-ws">WEB</span></div>
  <div class="ai-body">
    <div class="ai-prompt-row"><input class="ai-input" id="ai-input" placeholder="Ask about your portfolio or any stock…"><button class="ai-submit" id="ai-btn" onclick="runAI()">Analyze ↗</button></div>
    <div class="ai-response" id="ai-response" style="color:var(--text-muted);font-style:italic;">Ask anything — powered by Claude with live web search.</div>
  </div></div>`;
}

function bindMiniAI(){
  const inp=document.getElementById('ai-input');
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')runAI();});
}

async function runAI(){
  if(!API_KEY){alert('Enter your Anthropic API key at the top of the page.');return;}
  const inp=document.getElementById('ai-input');
  const btn=document.getElementById('ai-btn');
  const resp=document.getElementById('ai-response');
  const q=inp?.value.trim(); if(!q) return;
  btn.disabled=true; btn.textContent='…';
  resp.innerHTML='<span class="ai-typing">Analyzing with live web search</span>';
  try {
    const text=await claudeCall(
      `You are PRISM, a sharp equity analyst with live web access. Be direct and analytical. User's portfolio:\n${portfolioCtx()}\n\nToday: ${new Date().toDateString()}. Max 250 words. Bold key insights with **text**.`,
      q, true
    );
    resp.innerHTML=text.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  } catch(e){ resp.innerHTML=`<span style="color:var(--red)">Error: ${e.message}</span>`; }
  btn.disabled=false; btn.textContent='Analyze ↗';
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function renderView(){
  if(currentView==='portfolio') renderPortfolio();
  else if(currentView==='news') renderNews();
  else if(currentView==='watchlist') renderWatchlist();
  else if(currentView==='prospect') renderProspect();
  else renderAIView();
}

function switchView(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const idx=['portfolio','news','watchlist','prospect','ai'].indexOf(view);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  renderView();
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function addStock(){
  const ticker=document.getElementById('add-ticker').value.toUpperCase().trim();
  const name=document.getElementById('add-name').value.trim();
  const shares=parseFloat(document.getElementById('add-shares').value);
  const cost=parseFloat(document.getElementById('add-cost').value);
  const sector=document.getElementById('add-sector').value.trim()||'Other';
  if(!ticker||!name||!shares||!cost) return;
  const colors=['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#f97316'];
  portfolio.push({ticker,name,shares,cost,price:cost*(1+(Math.random()-.3)*.12),sector,color:colors[portfolio.length%colors.length]});
  closeModal(); renderView();
}
function removePosition(t){ portfolio=portfolio.filter(p=>p.ticker!==t); renderPortfolio(); }
function refreshPrices(){
  portfolio.forEach(p=>{p.price=fuzz(p.price);});
  watchlist.forEach(w=>{w.price=fuzz(w.price);const d=(Math.random()-.48)*3;w.change=+d.toFixed(2);w.pct=+(d/w.price*100).toFixed(2);});
  renderView();
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderPortfolio();
</script>
